name: Release new version

on:
  push:
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run release pipeline without pushing commits/tags or publishing'
        required: false
        default: true
        type: boolean

permissions:
  contents: read # for checkout

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # Needed to allow pushes back to the repository
      - name: Configure git for GitHub Actions
        run: |
          git config --global url."https://${GITHUB_TOKEN}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_BUILDUSERSICKAG }}

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          install-command: 'PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=true pnpm install'

      # Make sure pnpm is able to release
      # @see https://github.com/pnpm/pnpm/issues/3141#issuecomment-1305563972
      - name: Setup PNPM publish config
        run: pnpm config set '//registry.npmjs.org/:_authToken' "${NODE_AUTH_TOKEN}"
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_RELEASE_TOKEN_CS}}

      # Always ensure Metadata and MCP are part of the pending release.
      # Script is idempotent and only writes a changeset when required packages are missing.
      - name: Ensure Metadata and MCP changeset
        run: node packages/_private/release-utils/src/ensure-mcp-changeset.js

      - name: Creating releases via Changesets
        env:
          # Legacy GH_TOKEN, may be removed if not needed.
          GH_TOKEN: ${{ secrets.GH_RELEASE_BUILDUSERSICKAG }}
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_BUILDUSERSICKAG }}
          NPM_TOKEN: ${{ secrets.NPM_RELEASE_TOKEN_CS }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
        run: |
          set -euo pipefail

          # Final release process

          if [ "${DRY_RUN}" = "true" ]; then
            echo "⚠️ Running release workflow in DRY RUN mode"
          fi

          # Creates changelogs and bumps versions
          pnpm changeset version

          # Make sure to rebuild our sources as we may get errors otherwise
          pnpm --filter components --filter tokens --filter styles build

          # Build MCP with updated metadata after version changes
          echo "Building Metadata and MCP with updated metadata..."
          if ! pnpm --filter metadata --filter mcp build; then
            echo "❌ Metadata and MCP build failed"
            exit 1
          fi

          # Update the watermark file with the new version
          pnpm -C packages/mcp run watermark:baseline

          # Save the changes to git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          git commit -m "chore: 🚀 version packages [skip ci]"

          if [ "${DRY_RUN}" = "true" ]; then
            echo "Dry run active: skipping git push/tag push"
            echo "Dry run active: running npm publish validation only"
            pnpm publish --recursive --access=public --dry-run
          else
            git push origin main

            # Create the new tags we need
            pnpm changeset tag

            # Push tags to remote
            git push --tags

            # Finally, push to the registry
            pnpm publish --recursive --access=public
          fi

      # This workflow triggers the Storybook deployment
      - name: Releases done
        run: echo "Releases done – Storybook deployment will be triggered now"
