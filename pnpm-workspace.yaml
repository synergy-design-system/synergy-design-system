packages:
  - "packages/*"
  - "packages/_private/*"

# Make sure that we only allow updates of packages that have been released for at least 24 hours
minimumReleaseAge: 1440

overrides:
  browserslist: ">=4.24.3"

patchedDependencies:
  "@changesets/assemble-release-plan": patches/@changesets__assemble-release-plan.patch

allowBuilds:
  "@bundled-es-modules/glob": true
  "@parcel/watcher": true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  rs-module-lexer: true
  sharp: true
  style-dictionary: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  # Renovate security update: astro@7.1.0
  - astro@7.1.0
